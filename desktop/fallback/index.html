<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>solo-eikaiwa</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="card">
    <span class="badge">solo-eikaiwa</span>
    <h1>起動に失敗しました</h1>
    <p>ローカルサーバを起動できませんでした。しばらく待ってから再試行するか、下記のログファイルを確認してください。</p>
    <p><code>~/Library/Application Support/com.local.solo-eikaiwa.desktop/logs/sidecar.log</code></p>
    <p class="en">Failed to start the local server. Retry in a moment, or check the log file above for details.</p>
    <button id="retry">再試行 / Retry</button>
    <div id="status"></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
